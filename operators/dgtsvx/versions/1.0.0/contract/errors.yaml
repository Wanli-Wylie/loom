error_channel:
  parameter: INFO
  stability: stable
codes:
  - code: "0"
    severity: ok
    meaning: successful exit
  - code: "< 0"
    severity: fatal
    meaning: the -INFO-th argument had an illegal value
  - code: "1..N"
    severity: fatal
    meaning: U(i,i) is exactly zero; factorization is singular, so solution/error bounds are unavailable
  - code: "N+1"
    severity: warning
    meaning: U is nonsingular but reciprocal condition estimate is below machine precision
