abi: lapack-f77
symbol: dgtsvx_
argument_passing: by-reference
layout:
  matrix_order: column-major
  scalar_types:
    integer: 32-bit or compiler-default Fortran INTEGER
    double_precision: IEEE-754 binary64
mutability:
  input_only:
    - FACT
    - TRANS
    - N
    - NRHS
    - DL
    - D
    - DU
    - B
    - LDB
    - LDX
  conditional_inout:
    - DLF
    - DF
    - DUF
    - DU2
    - IPIV
  output:
    - X
    - RCOND
    - FERR
    - BERR
    - INFO
  workspace:
    - WORK
    - IWORK
